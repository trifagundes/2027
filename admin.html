<!DOCTYPE html>
<html lang="pt-BR" >

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Rangers Cycling</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;700;800;900&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-brand">
                <span class="logo-text">RANGERS</span>
                <span class="logo-year">ADMIN</span>
            </div>
            
            <nav class="admin-nav" id="admin-nav">
                <button class="nav-item active" data-file="campanha">Campanha</button>
                <button class="nav-item" data-file="contatos">Contatos / Rodapé</button>
                <button class="nav-item" data-file="sobre">Sobre</button>
                <button class="nav-item" data-file="equipe">Atletas (Equipe)</button>
                <button class="nav-item" data-file="agenda">Agenda</button>
                <button class="nav-item" data-file="titulos">Conquistas</button>
                <button class="nav-item" data-file="patrocinadores">Patrocinadores</button>
                <button class="nav-item" data-file="pacotes_patrocinio">Pacotes Patrocínio</button>
                <button class="nav-item" data-file="master">Master (Painel Config)</button>
                <button class="nav-item" data-file="hero">Hero (Capa)</button>
            </nav>

            <div class="admin-actions">
                <a href="index.html" class="btn-outline" style="width: 100%; text-align: center; margin-bottom: 1rem;">Voltar ao Site</a>
                <button id="btn-export-all" class="btn-primary" style="width: 100%;">Exportar Tudo</button>
                <button id="btn-clear-cache" class="btn-outline" style="width: 100%; margin-top: 1rem; border-color: #ff5555; color: #ff5555;">Limpar Alterações</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <h1 id="current-section-title">Carregando...</h1>
                    <button id="theme-toggle" class="btn-outline btn-theme" aria-label="Alternar Tema" style="padding: 0.5rem; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">🌓</button>
                </div>
                <button id="btn-save" class="btn-primary">Salvar no Navegador</button>
            </header>

            <div class="admin-content">
                <div id="form-container" class="form-container">
                    <!-- Formulário será gerado aqui via JS -->
                    <div class="loading-spinner">Carregando painel...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Edição -->
    <div id="admin-modal" class="admin-modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <header class="modal-header">
                <h2 id="modal-title">Editar Item</h2>
                <button id="modal-close" class="btn-close">&times;</button>
            </header>
            <div id="modal-body" class="modal-body">
                <!-- Conteúdo do modal dinâmico -->
            </div>
            <footer class="modal-footer">
                <button id="modal-btn-cancel" class="btn-outline">Cancelar</button>
                <button id="modal-btn-save" class="btn-primary">Salvar Alterações</button>
            </footer>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
